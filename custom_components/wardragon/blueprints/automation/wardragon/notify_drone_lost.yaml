blueprint:
  name: WarDragon — drone lost
  description: >-
    Fire when a WarDragon-tracked drone has gone silent past the inactivity
    timeout. Uses the `wardragon_drone_lost` event.
  domain: automation
  source_url: https://github.com/alphafox02/WarDragon-HA-Integration/blob/main/custom_components/wardragon/blueprints/automation/wardragon/notify_drone_lost.yaml
  input:
    notify_target:
      name: Notify service
      description: The notify service to call (e.g. `notify.mobile_app_phone`).
      default: notify.notify
      selector:
        text:
trigger:
  - platform: event
    event_type: wardragon_drone_lost
action:
  - service: !input notify_target
    data:
      title: WarDragon
      message: "Drone {{ trigger.event.data.drone_id }} has gone silent."
mode: parallel
max_exceeded: silent
